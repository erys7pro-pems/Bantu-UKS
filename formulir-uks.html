<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulir Data Siswa Sakit — UKS</title>
<style>
  :root{
    --bg: #F3F7F9;
    --surface: #FFFFFF;
    --primary: #1D6F8C;
    --primary-dark: #145469;
    --accent: #4FBFB8;
    --text: #1E2A32;
    --text-muted: #6B7C85;
    --border: #DCE6EA;
    --border-strong: #C3D3D9;
    --danger: #C2564D;
    --danger-bg: #FBEDEC;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    font-family: var(--font);
    color: var(--text);
    padding: 32px 16px 64px;
  }

  .sheet{
    max-width: 980px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(20,84,105,0.04), 0 8px 24px rgba(20,84,105,0.06);
    overflow: hidden;
  }

  /* Header */
  .header{
    display:flex;
    align-items:center;
    gap:16px;
    padding: 24px 32px;
    background: linear-gradient(180deg, #FFFFFF 0%, #F7FBFC 100%);
    border-bottom: 1px solid var(--border);
  }

  .cross-icon{
    flex: none;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--primary);
    position: relative;
  }
  .cross-icon::before, .cross-icon::after{
    content:"";
    position:absolute;
    background: #fff;
    border-radius: 2px;
  }
  .cross-icon::before{ width: 20px; height: 6px; top: 19px; left: 12px; }
  .cross-icon::after{ width: 6px; height: 20px; top: 12px; left: 19px; }

  .header-text h1{
    font-size: 19px;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  .header-text p{
    margin: 0;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* Body */
  .body{
    padding: 28px 32px 32px;
  }

  .meta-row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .field label{
    display:block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  .field input{
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
    background: var(--surface);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus{
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(29,111,140,0.12);
  }

  .section-label{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-label h2{
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    margin: 0;
  }
  .count-pill{
    font-size: 12px;
    color: var(--primary-dark);
    background: #E7F2F5;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  /* Table */
  .table-wrap{
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table{
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead th{
    background: #F7FAFB;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text-muted);
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody td{
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:last-child td{ border-bottom: none; }
  tbody tr:hover{ background: #FBFDFD; }

  .col-no{
    width: 40px;
    text-align:center;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 13px;
  }
  .col-kelas{ width: 130px; }
  .col-action{ width: 44px; text-align:center; }

  td select{
    width: 100%;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    padding: 8px 8px;
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
    cursor: pointer;
    transition: all .15s ease;
  }
  td select:hover{ border-color: var(--primary); }
  td select:focus{
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(29,111,140,0.12);
  }

  td input{
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    padding: 8px 8px;
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
  }
  td input:hover{
    border-color: var(--border-strong);
    background: #FCFEFE;
  }
  td input:focus{
    outline: none;
    border-color: var(--primary);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(29,111,140,0.12);
  }
  td input::placeholder{ color: #A9B7BD; }

  .btn-remove{
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    transition: all .15s ease;
  }
  .btn-remove:hover{
    background: var(--danger-bg);
    border-color: var(--danger);
    color: var(--danger);
  }

  .table-actions{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-top: 14px;
  }

  .btn-add{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    color: var(--primary-dark);
    font-weight: 600;
    font-size: 13.5px;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .btn-add:hover{
    border-color: var(--primary);
    background: #F1F8FA;
  }
  .btn-add svg{ width:14px; height:14px; }

  .helper-text{
    font-size: 12.5px;
    color: var(--text-muted);
  }

  .data-status{
    margin-top: 10px;
    font-size: 12px;
    color: var(--primary-dark);
  }

  /* Footer actions */
  .footer{
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display:flex;
    justify-content: flex-end;
    gap: 12px;
  }

  .btn{
    padding: 11px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .15s ease;
  }
  .btn-secondary{
    background: var(--surface);
    border-color: var(--border-strong);
    color: var(--text);
  }
  .btn-secondary:hover{ background: #F4F7F8; }
  .btn-primary{
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover{ background: var(--primary-dark); }

  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--primary-dark);
    color: #fff;
    padding: 12px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all .25s ease;
    box-shadow: 0 8px 24px rgba(20,84,105,0.25);
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 640px){
    .meta-row{ grid-template-columns: 1fr; }
    .body{ padding: 20px; }
    .header{ padding: 18px 20px; }
    thead th, tbody td{ padding: 8px 6px; font-size: 13px; }
  }

  @media print{
    body{ background: #fff; padding: 0; }
    .sheet{ box-shadow:none; border:none; }
    .btn-remove, .btn-add, .footer, .col-action{ display:none !important; }
  }
</style>
</head>
<body>

  <div class="sheet">
    <div class="header">
      <div class="cross-icon" aria-hidden="true"></div>
      <div class="header-text">
        <h1>Formulir Data Siswa Sakit</h1>
        <p>Unit Kesehatan Sekolah (UKS)</p>
      </div>
    </div>

    <div class="body">
      <div class="meta-row">
        <div class="field">
          <label for="tanggal">Tanggal</label>
          <input type="date" id="tanggal">
        </div>
        <div class="field">
          <label for="petugas">Petugas Input</label>
          <input type="text" id="petugas" placeholder="Nama petugas UKS">
        </div>
      </div>

      <div class="section-label">
        <h2>Daftar Siswa</h2>
        <span class="count-pill" id="rowCount">1 baris</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-no">No</th>
              <th class="col-kelas">Kelas</th>
              <th>Nama Siswa</th>
              <th>Keterangan</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
      </div>

      <div class="table-actions">
        <button class="btn-add" id="btnAddRow" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Tambah Baris
        </button>
        <span class="helper-text">Pilih Kelas dulu, lalu ketik/pilih Nama Siswa dari daftar kelas tersebut</span>
      </div>
      <div id="dataStatus" class="data-status"></div>

      <div class="footer">
        <button class="btn btn-secondary" id="btnReset" type="button">Bersihkan Formulir</button>
        <button class="btn btn-primary" id="btnSubmit" type="button">Simpan Data</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Data tersimpan</div>

<script>
  // ====== Konfigurasi Google Sheets ======
  // Tempel URL Web App Apps Script Anda di sini (lihat panduan setup).
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPj2NcZSxBbKLlVdql4wU-4K5YwLHY0LRzknGh0wG75Fz1kbjgsERzlT-af5houIM3/exec';

  // ====== Database kelas & siswa ======
  // Data ini diisi otomatis dari Google Sheets (tab "Siswa") saat halaman dibuka.
  // Daftar di bawah hanya CADANGAN jika koneksi ke spreadsheet gagal.
  const studentsByClass = {
    "1A": ["Ahmad Fauzi", "Siti Aminah"],
    "1B": ["Rizky Pratama", "Nur Halimah"]
  };
  let classList = Object.keys(studentsByClass);

  const tableBody = document.getElementById('tableBody');
  const rowCountLabel = document.getElementById('rowCount');
  let rowIndex = 0;

  function renumber(){
    const rows = tableBody.querySelectorAll('tr');
    rows.forEach((row, i) => {
      row.querySelector('.col-no').textContent = i + 1;
    });
    rowCountLabel.textContent = rows.length + ' baris';
  }

  function classOptionsHTML(){
    return '<option value="" disabled selected>Pilih kelas</option>' +
      classList.map(k => `<option value="${k}">${k}</option>`).join('');
  }

  function refreshClassSelectOptions(){
    document.querySelectorAll('.kelas-select').forEach(sel => {
      const current = sel.value;
      sel.innerHTML = classOptionsHTML();
      if(current && classList.includes(current)){
        sel.value = current;
      }
    });
  }

  async function loadStudentsFromSheet(){
    const statusEl = document.getElementById('dataStatus');
    if(SCRIPT_URL.includes('TEMPEL_URL_WEB_APP')){
      statusEl.textContent = 'URL Apps Script belum diisi — memakai data contoh.';
      return;
    }
    statusEl.textContent = 'Memuat daftar kelas & siswa dari spreadsheet...';
    try{
      const res = await fetch(SCRIPT_URL + '?type=siswa', { method: 'GET' });
      const data = await res.json();
      const kelasBaru = Object.keys(data);
      if(kelasBaru.length === 0){
        statusEl.textContent = 'Tab "Siswa" di spreadsheet masih kosong.';
        return;
      }
      Object.keys(studentsByClass).forEach(k => delete studentsByClass[k]);
      Object.assign(studentsByClass, data);
      classList = Object.keys(studentsByClass);
      refreshClassSelectOptions();
      statusEl.textContent = 'Daftar kelas & siswa termuat dari spreadsheet (' + classList.length + ' kelas).';
    }catch(err){
      statusEl.textContent = 'Gagal memuat dari spreadsheet, memakai data contoh sementara.';
    }
  }

  function updateNameOptions(select){
    const row = select.closest('tr');
    const datalist = row.querySelector('datalist');
    const nameInput = row.querySelector('.nama-input');
    const kelas = select.value;
    const names = studentsByClass[kelas] || [];
    datalist.innerHTML = names.map(n => `<option value="${n}">`).join('');
    nameInput.placeholder = names.length
      ? 'Ketik atau pilih nama siswa ' + kelas
      : 'Nama lengkap siswa';
  }

  function addRow(){
    rowIndex++;
    const listId = 'siswa-list-' + rowIndex;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="col-no">${rowIndex}</td>
      <td class="col-kelas">
        <select class="kelas-select">${classOptionsHTML()}</select>
      </td>
      <td>
        <input type="text" class="nama-input" list="${listId}" placeholder="Pilih kelas terlebih dahulu">
        <datalist id="${listId}"></datalist>
      </td>
      <td><input type="text" placeholder="cth. Demam, izin pulang"></td>
      <td class="col-action"><button class="btn-remove" type="button" title="Hapus baris">&times;</button></td>
    `;
    tr.querySelector('.kelas-select').addEventListener('change', (e) => updateNameOptions(e.target));
    tr.querySelector('.btn-remove').addEventListener('click', () => {
      tr.remove();
      renumber();
    });
    tableBody.appendChild(tr);
    renumber();
  }

  // Inisialisasi: muat data siswa dari spreadsheet, baru buat baris pertama
  (async function init(){
    await loadStudentsFromSheet();
    addRow();
  })();

  document.getElementById('btnAddRow').addEventListener('click', addRow);

  document.getElementById('btnReset').addEventListener('click', () => {
    if(!confirm('Bersihkan semua isian formulir?')) return;
    document.getElementById('tanggal').value = '';
    document.getElementById('petugas').value = '';
    tableBody.innerHTML = '';
    rowIndex = 0;
    addRow();
  });

  document.getElementById('btnSubmit').addEventListener('click', () => {
    if(SCRIPT_URL.includes('TEMPEL_URL_WEB_APP')){
      alert('URL Apps Script belum diisi. Buka kode HTML, cari SCRIPT_URL, lalu tempel URL Web App Anda.');
      return;
    }

    const tanggal = document.getElementById('tanggal').value;
    const petugas = document.getElementById('petugas').value.trim();

    if(!tanggal || !petugas){
      alert('Isi Tanggal dan Petugas Input terlebih dahulu.');
      return;
    }

    const rows = [];
    tableBody.querySelectorAll('tr').forEach(tr => {
      const kelas = tr.querySelector('.kelas-select').value;
      const nama = tr.querySelector('.nama-input').value.trim();
      const keterangan = tr.querySelectorAll('input')[1].value.trim();
      if(kelas && nama){
        rows.push({ kelas, nama, keterangan });
      }
    });

    if(rows.length === 0){
      alert('Isi minimal satu baris dengan Kelas dan Nama Siswa.');
      return;
    }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = 'Menyimpan...';

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ tanggal, petugas, rows })
    })
      .then(() => {
        const toast = document.getElementById('toast');
        toast.textContent = 'Data tersimpan ke Google Sheets';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      })
      .catch(() => {
        alert('Gagal mengirim data. Periksa koneksi internet atau URL Apps Script.');
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = 'Simpan Data';
      });
  });

  // Set tanggal hari ini sebagai default
  document.getElementById('tanggal').valueAsDate = new Date();
</script>

</body>
</html>
